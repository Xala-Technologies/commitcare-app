<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Institusjonsplan – Commit Care</title>
    <meta
      name="description"
      content="Hvordan du får tilgang til institusjonsplan for Commit Care – Avdeling Lier."
    />
    <style>
      :root {
        color-scheme: light dark;
        --fg: #1a1a1a;
        --muted: #444;
        --bg: #fafafa;
        --link: #0d9488;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --fg: #f5f5f5;
          --muted: #b5b5b5;
          --bg: #121212;
          --link: #5eead4;
        }
      }
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        line-height: 1.6;
        max-width: 38rem;
        margin: 0 auto;
        padding: 2rem 1.25rem 3rem;
        color: var(--fg);
        background: var(--bg);
      }
      h1 {
        font-size: 1.5rem;
        font-weight: 650;
        margin: 0 0 1rem;
      }
      p {
        margin: 0 0 1rem;
        color: var(--muted);
      }
      a {
        color: var(--link);
        font-weight: 600;
      }
      a:focus-visible {
        outline: 2px solid var(--link);
        outline-offset: 2px;
      }
      .back {
        margin-top: 2rem;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <h1>Institusjonsplan</h1>
    <p>
      Full og oppdatert institusjonsplan for <strong>Commit Care – Avdeling Lier</strong> deles på
      forespørsel. Den inneholder detaljer om målgruppe, metodikk, organisering og internkontroll i
      tråd med gjeldende regelverk.
    </p>
    <p>
      <a href="mailto:info@commitcare.no">info@commitcare.no</a><br />
      <a href="tel:+4796665001">+47 96 66 50 01</a>
    </p>
    <p class="back"><a href="/">Til forsiden</a></p>
  </body>
</html>
